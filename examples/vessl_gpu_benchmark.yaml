name: rfx-gpu-benchmark
description: "rfx FDTD CPU vs GPU speedup benchmark on RTX 4090"
tags: [rfx, benchmark, gpu, jax]
resources:
  cluster: remilab-c0
  preset: gpu-rtx4090
image: nvcr.io/nvidia/jax:24.04-py3
env:
  PYTHONUNBUFFERED: "1"
  XLA_PYTHON_CLIENT_PREALLOCATE: "false"
mount:
  /root/workspace/: volume://remilab-fs/personal-workspaces/
run: |-
  cd /root/workspace/byungkwan-workspace/research/rfx
  echo "=== rfx GPU Benchmark ===" && echo "Node:$(hostname)" && echo "Start:$(date)"
  pip install -q -e .
  python -c "import jax; print(f'JAX backend: {jax.default_backend()}'); print(f'Devices: {jax.devices()}')"
  python examples/gpu_benchmark.py
  echo "=== Done $(date) ==="
